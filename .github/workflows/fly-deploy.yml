name: Deploy simulator to Fly.io

# Tag-to-deploy for the live simulator (the antennaknobs Fly app). Releases are
# cut by pushing a v* tag (the same ritual that publishes to PyPI, see
# publish.yml) — the tagged commit is built on Fly's remote builders and
# released, so the version number always names what's live. Merging to main does
# NOT deploy; main is the always-green integration line. Gated on an app-scoped
# secret (FLY_API_TOKEN_SIMULATOR), separate from the docs site's deploy
# (deploy-docs.yml / FLY_API_TOKEN_DOCS) so the two never cross-trigger.
# workflow_dispatch stays as the manual hotfix / rollback escape hatch (pick any
# ref in the Run-workflow dialog). NOTE: if a Fly dashboard GitHub integration is
# also connected to this app, disconnect it — otherwise it deploys on push.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Never run two deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: fly-deploy-simulator
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Stay green (not red) if the secret is missing: skip with a notice.
      - name: Check for Fly token
        id: token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_SIMULATOR }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN_SIMULATOR not set — skipping simulator deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up flyctl
        if: steps.token.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: steps.token.outputs.skip != 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_SIMULATOR }}
        # Retry on transient failures: Fly's remote builder occasionally drops
        # the connection mid-build ("rpc error: code = Unavailable ... EOF"),
        # which failed the v0.10.0 release deploy while PyPI succeeded — leaving
        # the hosted simulator stale on an otherwise-good release. `flyctl
        # deploy` is idempotent (a re-run just rebuilds + re-releases the same
        # tagged commit), so retrying is safe; a genuine failure still fails
        # after all attempts.
        run: |
          for attempt in 1 2 3; do
            echo "::group::flyctl deploy (attempt $attempt/3)"
            if flyctl deploy --remote-only; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::flyctl deploy attempt $attempt failed; retrying in $((attempt * 20))s"
              sleep "$((attempt * 20))"
            fi
          done
          echo "::error::flyctl deploy failed after 3 attempts"
          exit 1

      # A green deploy does not prove the fleet converged: flyd can revert a
      # machine's update seconds after flyctl declares it healthy, leaving the
      # edge load-balancing between app versions (issue #403 — it took three
      # "successful" releases to notice). Verify what is actually running.
      - name: Verify fleet convergence
        if: steps.token.outputs.skip != 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_SIMULATOR }}
        run: scripts/verify_fly_fleet.sh antennaknobs https://app.antennaknobs.dev
