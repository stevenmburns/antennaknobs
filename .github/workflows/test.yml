# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Test Python package

on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Set up ccache
      # Caches object files for the momwire C++ accelerator (built from source in
      # the "Install momwire" step). The action masquerades gcc/g++ on PATH, so
      # setuptools' default compiler invocation routes through ccache with no
      # CC/CXX overrides. Cold runs see no benefit; warm runs (the common case,
      # when _accelerators.cpp is unchanged) skip the recompile.
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ccache-${{ runner.os }}-py312
        max-size: 200M
        # create the gcc/g++ -> ccache shims on PATH; without this the action
        # caches ccache but nothing routes through it (the compile isn't cached).
        create-symlink: true
    - name: Install dependencies
      # Build prerequisites only: setuptools/pybind11/numpy must be present
      # before momwire's --no-build-isolation source build below. The test
      # tooling (pytest, coverage) and the web-server test client (fastapi,
      # httpx2) are NOT pinned here — they come from the declared `.[test]`
      # extra at "Install antennaknobs" so a clean clone reproduces CI with
      # `pip install -e ".[test]"`.
      run: |
        python -m pip install --upgrade pip
        pip install setuptools numpy scipy matplotlib scikit-rf pybind11
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install PyNEC from the python-necpp release wheel
      # PyNEC is no longer built from a submodule — install the self-contained
      # wheel (OpenBLAS vendored via scipy-openblas32) from the python-necpp
      # fork's GitHub Release. The fork's distribution name is `pynec-accel`
      # (import name stays `PyNEC`). --no-index so upstream PyNEC/pynec on PyPI
      # (broken builds on current Python, missing our BLAS/OpenMP work) can never
      # shadow it; numpy is already installed above.
      run: |
        pip install pynec-accel --no-index \
          --find-links https://github.com/stevenmburns/python-necpp/releases/expanded_assets/v1.7.4-accel.3

    - name: Install momwire (vendored MoM engine)
      # momwire is still a submodule; its C++ accelerator builds from source here.
      # --remote tracks momwire's main; --no-build-isolation so setup.py sees the
      # numpy + pybind11 installed above.
      run: |
        git submodule update --init --remote momwire
        pip install --no-build-isolation -e ./momwire

    - name: Install antennaknobs
      # `.[test]` pulls in pytest + coverage + the web extra (fastapi, uvicorn,
      # …) + httpx2 for Starlette's TestClient, so the full suite — including the
      # web-server tests — runs without any ad-hoc pip installs.
      run: pip install -e ".[test]"

    - name: Fast lane (PRs) — no per-design solver catalog, no coverage
      # Skips the antenna_computation_check tests (the per-design solver
      # catalogs). Keeps representative engine/solver coverage + all
      # load/schema/unit tests. No coverage instrumentation on PRs.
      if: github.event_name == 'pull_request'
      # `python -m pytest` (not bare `pytest`) keeps CWD on sys.path, the
      # conventional form shared with the main-lane command below. The web
      # server now lives at src/antennaknobs/web and imports as the installed
      # `antennaknobs.web` subpackage (pip install -e . above), so it no longer
      # depends on the repo root being on sys.path the way the old top-level
      # `web/` package did.
      run: python -m pytest -m "not antenna_computation_check" tests/

    - name: Full suite + coverage (push to main only)
      # The complete suite, including the per-design solver catalogs, with
      # coverage instrumentation. Runs once per merge to main, not per PR.
      if: github.event_name == 'push'
      run: coverage run --source=src/ -m pytest tests/

    - name: Coverage comment
      if: github.event_name == 'push'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}

  wheel-smoke:
    # Install antennaknobs from the BUILT WHEEL with PyPI deps only — no git
    # submodule — and run one real solve through the web server's entry point.
    # This is the environment Fly and `pip install antennaknobs` actually get.
    # The job above installs momwire editable from the submodule, so it can
    # never catch code that uses a momwire API the pyproject version floor
    # does not guarantee; that exact split shipped v0.13.0 broken (solves used
    # momwire.CancelToken while the floor still admitted momwire 0.2.3).
    #
    # Deliberately cheap: no submodule checkout, no ccache, no PyNEC, no
    # frontend build (the server's static mount is gated on the directory
    # existing, and the smoke only calls the solve path).
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      # No `submodules:` — momwire MUST come from PyPI here; that's the test.
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Build the wheel
      run: pipx run build --wheel
    - name: Install from the wheel (PyPI deps only)
      run: |
        WHL=$(ls dist/*.whl)
        pip install "${WHL}[web]"
    - name: Solve smoke through the server entry point
      # Run from a temp dir so a stray `momwire/` source dir on CWD can never
      # shadow the installed package.
      run: |
        SMOKE=$(pwd)/.github/scripts/wheel_solve_smoke.py
        cd "$(mktemp -d)"
        python "$SMOKE"
