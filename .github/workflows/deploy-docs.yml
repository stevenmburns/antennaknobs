name: Deploy docs site to Fly.io

# Tag-to-deploy for the static docs site (the antennaknobs-docs Fly app).
# Releases are cut by pushing a v* tag (see publish.yml / fly-deploy.yml): the
# docs site is rebuilt + released from the tagged commit alongside the simulator,
# so a release ships the whole system as one consistent versioned snapshot.
# Merging to main does NOT deploy. Separate from the simulator deploy
# (fly-deploy.yml) and gated on its own app-scoped secret (FLY_API_TOKEN_DOCS) so
# the two never cross-trigger. workflow_dispatch is the manual escape hatch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Stay green (not red) if the secret is missing: skip with a notice.
      - name: Check for Fly token
        id: token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DOCS }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN_DOCS not set — skipping docs deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up flyctl
        if: steps.token.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy docs
        if: steps.token.outputs.skip != 'true'
        working-directory: site
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DOCS }}

      # Same convergence check as the simulator deploy (issue #403): a machine
      # can silently revert to its old image after a "successful" deploy.
      - name: Verify fleet convergence
        if: steps.token.outputs.skip != 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DOCS }}
        run: scripts/verify_fly_fleet.sh antennaknobs-docs https://antennaknobs.dev
