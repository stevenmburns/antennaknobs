name: publish

# Build and publish the antennaknobs distribution. antennaknobs is pure Python
# (no compiled extension — momwire/PyNEC carry the C++), so this produces a
# single universal py3-none-any wheel plus an sdist; there is no per-platform
# wheel matrix and no cibuildwheel.
#
# Triggers:
#   - push tag v*: build, publish to PyPI (Trusted Publishing), and attach
#     the wheel + sdist to the GitHub Release.
#   - workflow_dispatch: build the dist on a branch to validate packaging
#     (sdist/wheel contents) without publishing — the publish/release jobs are
#     tag-gated, so a manual run only exercises `build`.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        # No submodules: the dist is pure Python and does not build momwire.
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/antennaknobs/web/frontend/package-lock.json
      - name: Build the React frontend
        # Produces src/antennaknobs/web/static (vite outDir) which setup.py ships
        # as package data, so the wheel serves the browser UI with no Node at
        # install time.
        working-directory: src/antennaknobs/web/frontend
        run: |
          npm ci
          npm run build
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: pipx run build
      - name: Check metadata
        run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish-pypi:
    # Publish to PyPI via Trusted Publishing (OIDC) — no stored token. Requires a
    # trusted/pending publisher on pypi.org for project `antennaknobs`: owner
    # stevenmburns, repo antennaknobs, workflow publish.yml, no environment.
    # Omitting repository-url defaults the action to https://upload.pypi.org/legacy/.
    # skip-existing makes a re-run of an already-published version a no-op.
    name: publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  release:
    name: attach wheel + sdist to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
